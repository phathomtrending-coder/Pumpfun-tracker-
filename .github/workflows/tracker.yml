name: Pumpfun Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      PUBLIC_CHANNEL_ID: ${{ secrets.PUBLIC_CHANNEL_ID }}
      WATCHLIST_CHANNEL_ID: ${{ secrets.WATCHLIST_CHANNEL_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SCAN_INTERVAL: "30"

      WATCHLIST_MIN_MCAP: "2000"
      WATCHLIST_MAX_MCAP: "90000"
      WATCHLIST_MIN_VOL_5M: "25"
      WATCHLIST_MIN_VOL_1H: "2500"
      WATCHLIST_MIN_BUYS_1H: "5"
      WATCHLIST_MIN_LIQ: "2000"

      PUBLIC_MIN_MCAP: "6000"
      PUBLIC_MAX_MCAP: "120000"
      PUBLIC_MIN_VOL_5M: "100"
      PUBLIC_MIN_VOL_1H: "12000"
      PUBLIC_MIN_BUYS_1H: "12"
      PUBLIC_MIN_LIQ: "5000"
      PUBLIC_MIN_BUY_SELL_RATIO: "1.10"
      PUBLIC_MAX_RUG_DNA: "55"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker once
        run: python run_once.py
  
