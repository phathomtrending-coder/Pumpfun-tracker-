name: Pumpfun Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      PUBLIC_CHANNEL_ID: ${{ secrets.PUBLIC_CHANNEL_ID }}
      WATCHLIST_CHANNEL_ID: ${{ secrets.WATCHLIST_CHANNEL_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SCAN_INTERVAL: "30"
      WATCHLIST_MIN_MCAP: "4000"
      WATCHLIST_MAX_MCAP: "35000"
      WATCHLIST_MIN_VOL_5M: "300"
      WATCHLIST_MIN_BUYS_1H: "10"
      PUBLIC_MIN_MCAP: "8000"
      PUBLIC_MAX_MCAP: "45000"
      PUBLIC_MIN_VOL_5M: "1200"
      PUBLIC_MIN_BUYS_1H: "25"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker once
        run: python run_once.py
