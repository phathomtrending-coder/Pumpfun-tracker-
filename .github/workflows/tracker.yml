name: Pumpfun Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      PUBLIC_CHANNEL_ID: ${{ secrets.PUBLIC_CHANNEL_ID }}
      WATCHLIST_CHANNEL_ID: ${{ secrets.WATCHLIST_CHANNEL_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      CHANNEL_LINK: "https://t.me/EarlyPhantomTrending"
      PREMIUM_URL: "https://t.me/+qq8BsdtrV1czZmIx"
      SCAN_INTERVAL: "30"

      WATCHLIST_MIN_AGE_MIN: "0"
      WATCHLIST_MAX_AGE_MIN: "120"
      WATCHLIST_MIN_MCAP: "5000"
      WATCHLIST_MAX_MCAP: "50000"
      WATCHLIST_MIN_LIQ: "3000"
      WATCHLIST_MIN_VOL_1H: "2000"
      WATCHLIST_MIN_BUYS_1H: "3"
      WATCHLIST_MAX_SELL_TO_BUY_RATIO: "1.50"
      WATCHLIST_MIN_PRICE_CHANGE_1H: "-20"
      WATCHLIST_REQUIRE_SOCIAL_SIGNAL: "false"

      PUBLIC_MIN_AGE_MIN: "10"
      PUBLIC_MAX_AGE_MIN: "180"
      PUBLIC_MIN_MCAP: "8000"
      PUBLIC_MAX_MCAP: "60000"
      PUBLIC_MIN_LIQ: "5000"
      PUBLIC_MIN_VOL_1H: "6000"
      PUBLIC_MIN_VOL_5M: "400"
      PUBLIC_MIN_BUYS_1H: "8"
      PUBLIC_MIN_BUY_SELL_RATIO: "1.10"
      PUBLIC_MIN_PRICE_CHANGE_1H: "-5"
      PUBLIC_REQUIRE_SOCIAL_SIGNAL: "false"

      PRETREND_MIN_SCORE_PUBLIC: "55"
      PRETREND_MIN_SCORE_WATCHLIST: "35"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker once
        run: python run_once.py
